name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: "stable"
          cache: true

      - name: Install Android NDK 28.2.13676358
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses

      - name: Get Flutter packages
        run: flutter pub get

      - name: Clone llama.cpp (pinned commit)
        run: |
          LLAMA_COMMIT="b96b82fc852b83ea6f58ffcdc264308f60f79211"
          git clone --depth 1 https://github.com/ggml-org/llama.cpp llama.cpp
          cd llama.cpp
          git fetch --depth 1 origin "$LLAMA_COMMIT"
          git checkout FETCH_HEAD
          cd -
          echo "LLAMA_CPP_DIR=$(pwd)/llama.cpp" >> $GITHUB_ENV

      - name: Patch llama-mmap.cpp for NDK compatibility
        run: |
          LLAMA_MMAP="$LLAMA_CPP_DIR/src/llama-mmap.cpp"
          if [ -f "$LLAMA_MMAP" ]; then
            sed -i 's/posix_madvise/madvise/g; s/POSIX_MADV_WILLNEED/MADV_WILLNEED/g; s/POSIX_MADV_RANDOM/MADV_RANDOM/g' "$LLAMA_MMAP"
          fi

      - name: Fix Gradle JVM heap
        run: |
          sed -i 's/org.gradle.jvmargs=-Xmx[0-9]*m/org.gradle.jvmargs=-Xmx4g/' android/gradle.properties

      - name: Build release APK (x86_64 for emulator)
        run: flutter build apk --release --target-platform android-x64

      - name: Build release APK (arm64 for real devices)
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: besmartai-apk
          path: build/app/outputs/flutter-apk/*.apk
