name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: "stable"
          cache: true

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses

      - name: Get Flutter packages
        run: flutter pub get

      - name: Find pub cache and clone llama.cpp
        run: |
          PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
          LLAMAFU_DIR=$(find "$PUB_CACHE_DIR" -type d -name "llamafu-*" 2>/dev/null | head -1)
          echo "llamafu found at: $LLAMAFU_DIR"
          if [ -n "$LLAMAFU_DIR" ]; then
            CPP_DIR="$(dirname "$(dirname "$LLAMAFU_DIR")")/llama.cpp"
          else
            CPP_DIR="$PUB_CACHE_DIR/hosted/pub.dev/llama.cpp"
          fi
          echo "Cloning llama.cpp to: $CPP_DIR"
          git clone --depth 1 https://github.com/ggml-org/llama.cpp "$CPP_DIR"
          echo "LLAMA_CPP_DIR=$CPP_DIR" >> $GITHUB_ENV

      - name: Rewrite llamafu build.gradle for AGP 8.11 compatibility
        run: |
          LLAMAFU_BUILD="$HOME/.pub-cache/hosted/pub.dev/llamafu-0.1.0/android/build.gradle"
          if [ ! -f "$LLAMAFU_BUILD" ]; then
            echo "Looking for llamafu build.gradle..."
            LLAMAFU_BUILD=$(find "$HOME/.pub-cache" -name "build.gradle" -path "*/llamafu*/android/*" 2>/dev/null | head -1)
          fi
          echo "Patching: $LLAMAFU_BUILD"
          cat > "$LLAMAFU_BUILD" << 'GRADLE'
plugins {
    id "com.android.library"
    id "kotlin-android"
}

android {
    namespace "com.example.llamafu"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        minSdk 21
        targetSdk 34

        externalNativeBuild {
            cmake {
                def llamaCppDir = System.getenv("LLAMA_CPP_DIR") ?: project.findProperty("llama.cpp.dir") ?: "${projectDir}/../../../llama.cpp"
                arguments "-DLLAMA_CPP_DIR=${llamaCppDir}"
                cppFlags "-O3", "-DNDEBUG"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.18.1"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}
GRADLE

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pocket-ai-apk
          path: build/app/outputs/flutter-apk/*.apk
